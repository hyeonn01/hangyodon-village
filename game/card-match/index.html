<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
  <title>한교동 짝 맞추기!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@400;700&family=Gowun+Dodum:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <div id="top-ui">
        <div id="level-display">LEVEL 1</div>
        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>
    </div>
    <div id="info-btn">?</div>

    <div id="game-board-container">
        <div id="game-board" class="game-board"></div>
    </div>

    <div id="countdown-overlay" class="overlay hidden">
        <div id="countdown-text"></div>
    </div>

    <div id="nickname-overlay" class="overlay hidden">
      <div class="modal-content">
        <h2 class="modal-title">닉네임 설정</h2>
        <p class="modal-subtext">최초 1회 닉네임을 설정해주세요.</p>
        <input type="text" id="nickname-input" placeholder="최대 8글자" maxlength="8">
        <button id="save-nickname-btn">확인</button>
      </div>
    </div>

    <div id="modal-overlay" class="overlay hidden">
      <div class="modal-content">
        <h2 class="modal-title">게임 방법</h2>
        <div class="info-box">
          <p class="guide-text">
            시간 제한 바가 다 줄어들기 전에<br>
            똑같은 <strong>카드 짝</strong>을<br>
            모두 찾아주세요!
          </p>
        </div>
        <button id="close-btn">준비됐어요!</button>
      </div>
    </div>

    <div id="start-overlay" class="overlay hidden">
      <div class="start-content">
        <div id="start-title">카드 짝 맞추기 !</div>
        <p class="start-subtext">화면을 클릭하면 시작합니다</p>
      </div>
    </div>

    <div id="clear-overlay" class="overlay hidden">
        <div class="modal-content">
          <h2 class="modal-title" id="clear-title">LEVEL CLEAR</h2>
          <p id="clear-msg">다음 단계로 이동할까요?</p>
          <button id="next-btn">다음 단계로</button>
        </div>
    </div>

    <div id="gameover-overlay" class="overlay hidden">
      <div id="gameover-content">
        <div class="sad-emoticon">
          <img src="images/sad.png" alt="sad" width="80">
        </div>
        <h2 class="gameover-title">GAME OVER</h2>
        <p style="margin-bottom:20px; color:#666;">짝 맞추기에 실패했어요!</p>
        <button id="restart-btn">다시 시작하기</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
