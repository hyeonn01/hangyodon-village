<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>한교동 놀아주기</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
    
    <style>
        /* --- [기존 스타일 복구 및 고정 배경 최적화] --- */
        @import url('https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&family=Gowun+Dodum&display=swap');

        * { box-sizing: border-box; }

        :root {
            --border-width: clamp(8px, 3vw, 15px);
            --mint-color: #88D8C0;
            --soft-pink: #FFDDEB;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Gowun Dodum', sans-serif;
            height: 100%;
            overflow: hidden; /* 전체 스크롤 방지 */
            background-color: var(--mint-color);
            -webkit-font-smoothing: antialiased;
            cursor: url('kyodong_cursor.png') 32 32, auto;
        }

        /* [핵심] 배경 짤림 방지용 고정 레이어 */
        .bg-fixed-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('background.png') no-repeat center center;
            background-size: cover;
            z-index: 0;
            pointer-events: none;
        }

        /* [핵심] 기존 레이아웃을 유지하는 컨테이너 */
        .outer-frame {
            position: relative;
            z-index: 1;
            width: calc(100% - (var(--border-width) * 2));
            height: calc(100% - (var(--border-width) * 2));
            margin: var(--border-width);
            background-color: rgba(255, 255, 255, 0.9); /* 배경이 보이도록 약간 투명하게 설정 */
            border-radius: clamp(25px, 5vw, 40px);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        img { max-width: 100%; height: auto; object-fit: contain; image-rendering: -webkit-optimize-contrast; }
        button, a, .header-char, .game-card, .game-entry, #info-btn, .mode-btn, .share-btn { cursor: url('kyodong_cursor.png') 32 32, pointer; }

        /* --- 로딩 화면 --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.5s;
        }
        .loader-content { text-align: center; font-family: 'Dongle', sans-serif; font-size: 32px; color: #45B191; }
        .running-kyodon { height: clamp(60px, 15vh, 100px); animation: loaderBounce 0.5s infinite alternate; margin-bottom: 10px; }
        @keyframes loaderBounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        #loading-screen.fade-out { opacity: 0; pointer-events: none; }

        /* --- 비눗방울 배경 --- */
        #bubble-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .bubble {
            position: absolute; bottom: -50px; background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50%; pointer-events: auto;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-110vh) translateX(30px); opacity: 0; }
        }

        /* --- 헤더 (기존 디자인 유지) --- */
        .white-header {
            background-color: #ffffff; 
            min-height: 110px;
            padding: 20px 10px;
            display: flex; justify-content: center; align-items: center;
            border-bottom: 2px solid #f0f0f0;
            flex-shrink: 0;
            z-index: 10;
        }
        .header-content { display: flex; flex-direction: row; align-items: center; justify-content: center; width: 100%; max-width: 600px; gap: clamp(10px, 3vw, 30px); }
        .char-container { position: relative; display: flex; align-items: center; flex-shrink: 0; }
        .speech-bubble {
            position: absolute; right: 105%; top: 50%; transform: translateY(-50%);
            background: white; border: 2px solid #45B191; padding: 4px 12px; border-radius: 18px; 
            font-family: 'Dongle', sans-serif; font-size: clamp(18px, 4vw, 24px); 
            color: #333; opacity: 0; transition: opacity 0.5s ease; z-index: 20;
            width: max-content; max-width: 120px; text-align: center; line-height: 1.1;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05); pointer-events: none; word-break: keep-all; 
        }
        .speech-bubble::after { content: ''; position: absolute; left: 100%; top: 50%; transform: translateY(-50%); border-left: 8px solid #45B191; border-top: 5px solid transparent; border-bottom: 5px solid transparent; }
        .header-char { height: clamp(65px, 10vh, 90px); width: auto; cursor: pointer; transition: transform 0.2s; z-index: 21; }
        .title-wrapper { background: rgba(136, 216, 192, 0.1); padding: 5px clamp(15px, 4vw, 25px); border-radius: 40px; display: flex; align-items: center; }
        .main-title {
            font-family: 'Dongle', sans-serif; font-size: clamp(28px, 7vw, 55px); color: white; 
            margin: 0; line-height: 1; -webkit-text-stroke: 1.5px #45B191; paint-order: stroke fill;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); white-space: nowrap;
        }

        /* --- 게임 선택 영역 (기존 디자인 유지) --- */
        .game-section { flex: 1 0 auto; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .village-map { 
            display: flex; gap: clamp(20px, 5vw, 40px); 
            justify-content: center; flex-wrap: wrap; width: 100%;
        }
        .game-card {
            width: clamp(150px, 40vw, 260px); 
            height: clamp(210px, 50vh, 320px);
            background: rgba(255, 255, 255, 0.95);
            border: clamp(4px, 1vw, 6px) solid #88D8C0; border-radius: clamp(30px, 5vw, 50px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.2s; position: relative; box-shadow: 0 12px 0px #6eb9a2;
        }
        .game-card:hover { transform: translateY(6px); box-shadow: 0 6px 0px #6eb9a2; }
        .game-icon { width: 50%; height: auto; max-height: 90px; margin-bottom: 10px; }
        .large-icon { width: 52% !important; max-height: 90px !important; }
        .game-card h2 { font-size: clamp(20px, 5vw, 32px); margin: 10px 0 0; color: #333; }
        .game-card p { font-size: clamp(14px, 3vw, 18px); color: #777; margin: 0; }
        .game-badge { position: absolute; top: -15px; background: #FFB7C5; color: white; padding: 5px 20px; border-radius: 30px; font-size: 14px; font-weight: bold; border: 3px solid white; }
        .game-entry.locked { pointer-events: none; filter: grayscale(0.8); opacity: 0.7; }
        .lock-icon { font-size: clamp(30px, 8vw, 50px); margin-bottom: 10px; }

        /* --- 푸터 --- */
        .main-footer { padding: 30px 15px; text-align: center; background-color: #ffffff; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
        .share-container { width: 100%; max-width: 280px; margin: 0 auto 10px auto; }
        .share-btn { width: 100%; background-color: var(--soft-pink); color: #d687a7; border: none; padding: 12px; border-radius: 20px; font-family: 'Gowun Dodum', sans-serif; font-size: 15px; font-weight: bold; box-shadow: 0 4px 0px #f2c9db; transition: all 0.2s; }
        .share-btn:active { transform: translateY(2px); box-shadow: 0 2px 0px #f2c9db; }
        .copyright { font-size: 11px; color: #ccc; margin: 0; }

        /* --- 모달 공통 --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .hidden { display: none !important; }
        .modal-content { background: white; padding: 30px; border-radius: 50px; width: 90%; max-width: 350px; text-align: center; border: 6px solid #88D8C0; }
        .modal-buttons { display: flex; flex-direction: column; gap: 15px; }
        .mode-btn { text-decoration: none; font-size: 24px; padding: 12px; border-radius: 25px; color: white; font-weight: bold; transition: 0.2s; display: block; }
        .easy { background: #88D8C0; box-shadow: 0 6px 0 #6eb9a2; }
        .hard { background: #FFB7C5; box-shadow: 0 6px 0 #e8a2af; }
        .close-modal-text { margin-top: 10px; background: none; border: none; color: #aaa; font-size: 16px; font-family: 'Gowun Dodum'; text-decoration: underline; }

        /* --- 방명록 & 운세 --- */
        .guestbook-popup, .fortune-popup { background: white; padding: 25px; border-radius: 40px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .guestbook-popup { border: 6px solid #FFB7C5; }
        .fortune-popup { border: 5px solid var(--mint-color); }
        .fortune-card { background: #f0f9f7; border-radius: 20px; padding: 20px; margin: 15px 0; border: 2px dashed var(--mint-color); }
        .fortune-text { font-family: 'Dongle', sans-serif; font-size: 28px; color: #333; line-height: 1.2; white-space: pre-line; }
        .fortune-lucky-item { font-size: 15px; color: #45B191; margin-top: 10px; font-weight: bold; }
        .message-list { max-height: 200px; overflow-y: auto; text-align: left; background: #fffcfd; border-radius: 15px; padding: 10px; }
        .msg-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .guestbook-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .guestbook-form input { border: 2px solid #eee; padding: 10px; border-radius: 15px; outline: none; font-family: 'Gowun Dodum'; }
        .guestbook-form button { background: #FFB7C5; color: white; border: none; padding: 10px; border-radius: 15px; font-weight: bold; }
        
        #info-btn { position: fixed; bottom: 20px; right: 20px; width: clamp(50px, 12vw, 70px); height: clamp(50px, 12vw, 70px); background: #FFB7C5; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: clamp(25px, 6vw, 35px); border: 4px solid white; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s; }
    </style>
</head>
<body>

    <div class="bg-fixed-layer"></div>

    <div id="loading-screen">
        <div class="loader-content">
            <img src="hangyodon-logo.png" alt="로딩중" class="running-kyodon">
            <p>교동이가 준비 중이에요...</p>
        </div>
    </div>

    <div class="outer-frame">
        <div id="bubble-container"></div>

        <header class="white-header">
            <div class="header-content">
                <div class="char-container">
                    <div id="bubble" class="speech-bubble">안녕!</div>
                    <img src="hangyodon-logo.png" alt="한교동" class="header-char" onclick="handleKyodonClick()">
                </div>
                <div class="title-wrapper">
                    <h1 class="main-title">한교동 놀아주기</h1>
                </div>
            </div>
        </header>

        <main class="game-section">
            <div class="village-map">
                <div class="game-entry" onclick="openModal('bounce-ball')">
                    <div class="game-card">
                        <div class="game-badge">HOT</div>
                        <img src="bounce-ball-icon.png" alt="바운스볼" class="game-icon">
                        <h2>데려다주기</h2>
                        <p>교동이를 집으로!</p>
                    </div>
                </div>
                <div class="game-entry" onclick="openModal('get-sayuri')">
                    <div class="game-card">
                        <div class="game-badge" style="background: #FFB7CE;">NEW</div>
                        <img src="get-sayuri.png" alt="사유리구하기" class="game-icon large-icon">
                        <h2>사유리 구하기</h2>
                        <p>사유리를 받아줘!</p>
                    </div>
                </div>
                <div class="game-entry locked">
                    <div class="game-card"><div class="lock-icon">🔒</div><h2>준비 중</h2><p>Coming Soon</p></div>
                </div>
                <div class="game-entry locked">
                    <div class="game-card"><div class="lock-icon">🔒</div><h2>준비 중</h2><p>Coming Soon</p></div>
                </div>
            </div>
        </main>

        <footer class="main-footer">
            <div class="share-container">
                <button class="share-btn" onclick="sharePage()">🩵 친구에게 교동이 소개하기</button>
            </div>
            <p class="copyright">© 2026 Hangyodon Fan Page.</p>
        </footer>
    </div>

    <div id="game-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header"><h3>난이도 선택</h3></div>
            <div class="modal-buttons">
                <a href="#" id="easy-link" class="mode-btn easy" onclick="closeModal()">이지 모드 🐥</a>
                <a href="#" id="hard-link" class="mode-btn hard" onclick="closeModal()">하드 모드 🔥</a>
            </div>
            <button class="close-modal-text" onclick="closeModal()">나중에 할래</button>
        </div>
    </div>

    <div id="guestbook-modal" class="modal-overlay hidden">
        <div class="guestbook-popup">
            <h3>🩵교동이에게 한마디🩵</h3>
            <div class="guestbook-form">
                <input type="text" id="nickname" placeholder="닉네임" maxlength="5">
                <input type="text" id="message" placeholder="메시지 입력" onkeypress="if(event.keyCode==13) addMessage()">
                <button onclick="addMessage()">등록</button>
            </div>
            <div id="message-list" class="message-list">로딩 중...</div>
            <button class="close-modal-text" onclick="closeGuestbook()">닫기</button>
        </div>
    </div>

    <div id="fortune-modal" class="modal-overlay hidden">
        <div class="fortune-popup">
            <h3 style="font-family:'Dongle'; font-size:38px; color:#45B191; margin:0;">🩵 오늘의 교동운세 🩵</h3>
            <div class="fortune-card">
                <p id="fortune-text" class="fortune-text">운세를 불러오는 중...</p>
                <p id="fortune-item" class="fortune-lucky-item"></p>
            </div>
            <button class="close-modal-text" onclick="closeFortune()">확인 완료!</button>
        </div>
    </div>

    <div id="info-btn" onclick="openGuestbook()">❤</div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwhFIa0igBqaHTaIwYrsCgKMnE3TBKsYfhwPGXipEs7JmaoVHBg4rwPSoW8G7RZOIc4wg/exec';

        window.addEventListener('load', () => {
            const loader = document.getElementById('loading-screen');
            setTimeout(() => { loader.classList.add('fade-out'); }, 1500);
        });

        function openModal(gameType) { 
            const easyLink = document.getElementById('easy-link');
            const hardLink = document.getElementById('hard-link');
            if(gameType === 'bounce-ball') {
                easyLink.href = "./game/bounce-ball/index.html";
                hardLink.href = "./game/bounce-ball-hard/index.html";
            } else if(gameType === 'get-sayuri') {
                easyLink.href = "./game/get-sayuri/index.html";
                hardLink.href = "./game/get-sayuri-hard/index.html"; 
            }
            document.getElementById('game-modal').classList.remove('hidden'); 
        }

        function closeModal() { document.getElementById('game-modal').classList.add('hidden'); }
        function openGuestbook() { document.getElementById('guestbook-modal').classList.remove('hidden'); fetchMessages(); }
        function closeGuestbook() { document.getElementById('guestbook-modal').classList.add('hidden'); }
        function openFortune() { document.getElementById('fortune-modal').classList.remove('hidden'); }
        function closeFortune() { document.getElementById('fortune-modal').classList.add('hidden'); }

        function handleKyodonClick() { talk(); setTimeout(showFortune, 500); }

        const fortuneList = [
            { txt: "오늘은 새우튀김을 먹으면\n행운이 따를 거예요!", item: "럭키 아이템: 바삭한 튀김" },
            { txt: "바닷속처럼 평온한 하루가\n당신을 기다리고 있어요.", item: "럭키 아이템: 푸른색 소품" },
            { txt: "깜짝 놀랄 즐거운 소식이\n톡! 찾아와요.", item: "럭키 아이템: 스마트폰" },
            { txt: "오늘은 조금 졸려도 괜찮아요.\n충분히 쉬어가세요!", item: "럭키 아이템: 푹신한 베개" },
            { txt: "교동이가 당신의 오늘을\n마음 다해 응원하고 있어요!", item: "럭키 아이템: 거울" }
        ];

        function showFortune() {
            const randomFortune = fortuneList[Math.floor(Math.random() * fortuneList.length)];
            document.getElementById('fortune-text').innerText = randomFortune.txt;
            document.getElementById('fortune-item').innerText = randomFortune.item;
            openFortune();
        }

        function sharePage() {
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl).then(() => { alert("주소가 복사되었습니다! 🩵"); });
        }

        const messages = ["심심해..", "새우튀김!", "나랑 놀자!", "졸려어..", "뽀글뽀글.."];
        function talk() {
            const bubble = document.getElementById('bubble');
            const char = document.querySelector('.header-char');
            if(!bubble) return;
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            bubble.innerText = randomMsg;
            bubble.style.opacity = 1;
            if(char) char.style.transform = "scale(1.1)";
            setTimeout(() => { if(char) char.style.transform = "scale(1)"; }, 200);
            setTimeout(() => { bubble.style.opacity = 0; }, 2500);
        }
        setInterval(talk, 8000);

        async function fetchMessages() {
            const list = document.getElementById('message-list');
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                window.allMessages = data;
                renderMessages(false);
            } catch (e) {
                list.innerHTML = `<div style="padding:20px; color:#aaa; text-align:center;">메시지를 불러오지 못했습니다.</div>`;
            }
        }

        function renderMessages(showFull) {
            const list = document.getElementById('message-list');
            const data = window.allMessages || [];
            if(data.length === 0) {
                list.innerHTML = `<div style="padding:20px; color:#aaa; text-align:center;">메시지를 남겨보세요!</div>`;
                return;
            }
            const reversed = [...data].reverse();
            const displayMessages = reversed.slice(0, 3);
            list.innerHTML = displayMessages.map(m => `
                <div class="msg-item">
                    <span><strong>${m.nickname}</strong>: ${m.message || m.text}</span>
                </div>
            `).join('');
        }

        async function addMessage() {
            const nickInput = document.getElementById('nickname');
            const msgInput = document.getElementById('message');
            const nick = nickInput.value.trim();
            const msg = msgInput.value.trim();
            if(!nick || !msg) return;
            const newMsg = { id: Date.now(), nickname: nick, message: msg };
            try {
                document.getElementById('message-list').innerHTML = "등록 중...";
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(newMsg)
                });
                nickInput.value = ''; msgInput.value = '';
                fetchMessages();
            } catch (e) { fetchMessages(); }
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                closeModal(); closeGuestbook(); closeFortune();
            }
        }
    </script>
</body>
</html>
